%YAML 1.1
---
$schema: asdf://stsci.edu/datamodels/roman/schemas/rad_schema-2.0.0
id: asdf://stsci.edu/datamodels/roman/schemas/SSC/GDPS/keywords/meta_l2-1.0.0

title: Meta L2 keywords
extName: SSC
type: object
properties:
  segment:
    title: Segment number
    description: |
      Identifier for the segment. A segment is the sequence
      of activities produced by each iteration of an Astronomer's
      Proposal Tool (APT) segment plan in a pass. A segment may include
      multiple traversals of mosaic pattern(s), with element wheel moves
      occurring between observations. The allowed range of segment
      numbers is 001 to 999 inclusive.
    type: integer
    archive_catalog:
      datatype: smallint
      destination: [WFISpec.segment]
  visit:
    title: Visit number
    description: |
      A visit is the smallest scheduling unit for Roman,
      which is a sequence of exposures executed without interruption,
      including dither patterns. A visit corresponds to one tile of the
      selected mosaic pattern. The allowed range of visit numbers is 001
      to 999 inclusive.
    type: integer
    archive_catalog:
      datatype: smallint
      destination: [WFISpec.visit]
  observation_id:
    title: Programmatic Observation Identifier
    description: Observation ID of the last SOC-provided L2 spectral image used to create the file. Example value '0000101001001001001'
    type: string
    maxLength: 28
    archive_catalog:
      datatype: nvarchar(28)
      destination: [WFISpec.observation_id]
  exptime:
    title: Exposure time
    description: Exposure time in seconds
    type: number
    archive_catalog:
      datatype: float
      destination: [WFISpec.visit_exptime]
required: [segment, visit, observation_id, exptime]
